<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- 背景 -->
  <rect width="400" height="400" fill="#1d1d1d"/>

  <!-- Webpack Logo -->
  <g transform="translate(50, 50)">
    <!-- 外圈 -->
    <circle cx="150" cy="150" r="120" fill="none" stroke="#8ed5fb" stroke-width="8"/>
    <circle cx="150" cy="150" r="100" fill="none" stroke="#f8ab5f" stroke-width="8"/>
    <circle cx="150" cy="150" r="80" fill="none" stroke="#f9705a" stroke-width="8"/>
    <circle cx="150" cy="150" r="60" fill="none" stroke="#fff176" stroke-width="8"/>

    <!-- 中心 -->
    <circle cx="150" cy="150" r="30" fill="#42b983"/>
    <text x="150" y="160" text-anchor="middle" fill="white" font-size="24" font-weight="bold">W</text>
  </g>

  <!-- 装饰文字 -->
  <text x="200" y="360" text-anchor="middle" fill="#8ed5fb" font-size="18" font-family="Arial">WEBPACK</text>
</svg>
